type: class
meta:
  title: Order Model
classes:
  - id: entity
    name: Entity
    stereotype: abstract
    accent: neutral
    fields: ["Id: Guid", "CreatedAt: DateTimeOffset"]
  - id: order
    name: Order
    stereotype: aggregate
    fields: ["Status: OrderStatus", "Total: Money"]
    methods: ["AddLine(sku, qty)", "Submit()"]
  - id: line
    name: OrderLine
    fields: ["Sku: string", "Qty: int", "Price: Money"]
  - id: customer
    name: Customer
    accent: info
    fields: ["Name: string", "Email: string"]
    methods: ["Deactivate()"]
  - id: notifier
    name: IOrderNotifier
    stereotype: interface
    accent: info
    methods: ["OrderPlaced(order)"]
relations:
  - { from: order, to: entity, kind: inherits }
  - { from: customer, to: entity, kind: inherits }
  - { from: order, to: line, kind: composition, fromCard: "1", toCard: "*" }
  - { from: order, to: customer, kind: association, label: placed by, fromCard: "*", toCard: "1" }
  - { from: order, to: notifier, kind: dependency, label: raises }
