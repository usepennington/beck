meta:
  title: Web Platform
  subtitle: Generated by Beck.Authoring
  direction: TB
nodes:
  - { id: web, title: Web App, subtitle: Browser SPA, kind: user }
  - { id: gw, title: API Gateway, subtitle: Routing + auth, kind: gateway }
  - { id: auth, title: Auth Service }
  - { id: catalog, title: Catalog Service }
  - { id: orders, title: Orders Service }
  - { id: authdb, title: Auth DB, kind: db }
  - { id: catalogdb, title: Catalog DB, kind: db }
  - { id: events, title: Events, subtitle: Message bus, kind: queue }
groups:
  - { id: services, label: Services, members: [auth, catalog, orders], accent: primary }
  - { id: data, label: Data Stores, members: [authdb, catalogdb, events], accent: info }
edges:
  - { from: web, to: gw }
  - { from: gw, to: auth }
  - { from: gw, to: catalog }
  - { from: gw, to: orders }
  - { from: auth, to: authdb }
  - { from: catalog, to: catalogdb }
  - { from: orders, to: catalogdb }
  - { from: orders, to: events, kind: async }
flow:
  repeat: -1
  repeatDelay: 1.5
  steps:
    - status: { node: web, text: GET /orders, color: neutral }
    - packet: { from: web, to: gw, label: request, shape: circle, impact: true }
    - parallel: [{ packet: { from: gw, to: auth, color: info } }, { working: { node: orders } }]
    - packet: { from: gw, to: orders }
    - packet: { from: orders, to: catalogdb, color: warn }
    - idle: { node: orders }
    - packet: { from: orders, to: events, color: success, shape: ring, impact: true }
    - wait: 1

