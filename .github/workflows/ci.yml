# PR / push validation: build the whole .NET solution (the Beck engine, Beck.Skia, the tests,
# the authoring sample, and the docs site against Pennington from NuGet) and run the test suite.
# This is the guardrail that catches an engine regression or a docs/Pennington version mismatch
# before the deploy and publish workflows run.
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # MinVer reads git history when projects build in Release

      # NOTE: keep these as bare versions — inline comments inside the block scalar are parsed as
      # part of the version string and break setup-dotnet.
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Build solution
        run: dotnet build Beck.slnx -c Release

      - name: Test
        run: dotnet test dotnet/Beck.Tests/Beck.Tests.csproj -c Release --no-build
