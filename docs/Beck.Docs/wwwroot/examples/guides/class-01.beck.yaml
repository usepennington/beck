type: class
classes:
  - id: order
    name: Order
    stereotype: aggregate
    fields: ["Status: OrderStatus", "Total: Money"]
    methods: ["AddLine(sku, qty)", "Submit()"]
  - id: line
    name: OrderLine
    fields: ["Sku: string", "Qty: int"]
relations:
  - { from: order, to: line, kind: composition, fromCard: "1", toCard: "*" }
