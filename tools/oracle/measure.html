<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>Beck measurement oracle</title>
<style>
  /* Pin the fallback fonts to the committed TTFs so the browser measures the
     same glyphs the C# SkiaTextMeasurer does. Weights map: 400 Regular,
     500 Medium, 600 SemiBold, 700 Bold. */
  @font-face { font-family: 'Inter'; font-weight: 400; src: url('/dotnet/Beck.Rendering.Tests/fonts/Inter-Regular.ttf') format('truetype'); }
  @font-face { font-family: 'Inter'; font-weight: 500; src: url('/dotnet/Beck.Rendering.Tests/fonts/Inter-Medium.ttf') format('truetype'); }
  @font-face { font-family: 'Inter'; font-weight: 600; src: url('/dotnet/Beck.Rendering.Tests/fonts/Inter-SemiBold.ttf') format('truetype'); }
  @font-face { font-family: 'Inter'; font-weight: 700; src: url('/dotnet/Beck.Rendering.Tests/fonts/Inter-Bold.ttf') format('truetype'); }
  @font-face { font-family: 'IBM Plex Mono'; font-weight: 400; src: url('/dotnet/Beck.Rendering.Tests/fonts/IBMPlexMono-Regular.ttf') format('truetype'); }
  @font-face { font-family: 'IBM Plex Mono'; font-weight: 500; src: url('/dotnet/Beck.Rendering.Tests/fonts/IBMPlexMono-Medium.ttf') format('truetype'); }
  @font-face { font-family: 'IBM Plex Mono'; font-weight: 700; src: url('/dotnet/Beck.Rendering.Tests/fonts/IBMPlexMono-Bold.ttf') format('truetype'); }
  html, body { margin: 0; }
  #probe { position: absolute; left: -9999px; top: 0; display: inline-block; white-space: nowrap; }
</style>
</head>
<body>
<span id="probe"></span>
<script>
// FontRole → typography, mirroring src FontRoles.cs (px at 16px root).
const ROLES = {
  CardTitle:       { mono:false, w:600, px:14,    ls:0,     upper:false },
  CardSubtitle:    { mono:false, w:400, px:12,    ls:0,     upper:false },
  Status:          { mono:false, w:500, px:10.4,  ls:0,     upper:false },
  GhostLabel:      { mono:false, w:500, px:11.52, ls:0,     upper:false },
  StatusInline:    { mono:false, w:500, px:9.92,  ls:0,     upper:false },
  PillTitle:       { mono:false, w:600, px:14,    ls:0,     upper:false },
  PillSubtitle:    { mono:false, w:400, px:10.88, ls:0,     upper:false },
  ClassStereotype: { mono:false, w:400, px:10.4,  ls:0.03,  upper:false },
  ClassTitle:      { mono:false, w:600, px:14,    ls:0,     upper:false },
  ClassMember:     { mono:true,  w:400, px:11.52, ls:0,     upper:false },
  EdgeLabel:       { mono:false, w:500, px:11.2,  ls:0,     upper:false },
  PacketLabel:     { mono:false, w:600, px:10.56, ls:0,     upper:false },
  GroupLabel:      { mono:false, w:600, px:11.2,  ls:0.04,  upper:true  },
  MsgText:         { mono:true,  w:500, px:10.88, ls:0,     upper:false },
  BandLabel:       { mono:true,  w:700, px:9.92,  ls:0.14,  upper:true  },
  DiagramTitle:    { mono:false, w:700, px:24,    ls:-0.02, upper:false },
  DiagramSubtitle: { mono:false, w:400, px:14.4,  ls:0,     upper:false },
  Narration:       { mono:false, w:400, px:14.72, ls:0,     upper:false },
}
const probe = document.getElementById('probe')
window.measureRole = function (role, text) {
  const r = ROLES[role]
  if (!r) throw new Error('unknown role ' + role)
  probe.style.fontFamily = r.mono ? "'IBM Plex Mono'" : "'Inter'"
  probe.style.fontWeight = String(r.w)
  probe.style.fontSize = r.px + 'px'
  probe.style.letterSpacing = (r.ls * r.px) + 'px'
  probe.style.textTransform = r.upper ? 'uppercase' : 'none'
  probe.textContent = text
  return probe.getBoundingClientRect().width
}
// Batch: [[role, text], ...] -> [width, ...]
window.measureBatch = function (cases) { return cases.map(([role, text]) => window.measureRole(role, text)) }
window.fontsReady = false
document.fonts.ready.then(() => { window.fontsReady = true })
</script>
</body>
</html>
