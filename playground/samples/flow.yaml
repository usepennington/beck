meta:
  title: Credential Request
  subtitle: A request travels out and the credential returns
nodes:
  - { id: app, title: build.sh, kind: external, status: idle }
  - { id: cli, title: aac connect, subtitle: Pairs with device }
  - { id: sdk, title: RemoteClient, accent: primary, subtitle: Opens the tunnel }
  - { id: proxy, title: Proxy, kind: ghost, subtitle: Zero-knowledge relay }
  - { id: bw, title: Bitwarden, kind: ghost, status: ready }
edges:
  - { from: app, to: cli }
  - { from: cli, to: sdk }
  - { from: sdk, to: proxy, style: dashed }
  - { from: bw, to: proxy, style: dashed }
flow:
  repeat: -1
  repeatDelay: 2
  steps:
    - status: { node: app, text: get_credential(), color: neutral }
    - wait: 0.3
    - packet: { from: app, to: proxy, via: [cli, sdk] }
    - phase: requested
    - highlight: { node: bw, color: primary }
    - status: { node: bw, text: Credential requested, color: primary }
    - packet: { from: proxy, to: app, via: [sdk, cli], color: success }
    - wait: 1.2
